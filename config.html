<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars Cam Viewer</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="config-page">
    <div class="config-container">
        <div class="config-header">
            <i class="fas fa-cog"></i>
            <h1>Camera Configuration</h1>
            <p>Enter your IP camera connection details</p>
        </div>

        <form class="config-form" id="cameraConfigForm">
            <div class="form-group">
                <label for="cameraIp">
                    <i class="fas fa-network-wired"></i>
                    Camera IP Address
                </label>
                <input type="text" id="cameraIp" name="cameraIp" placeholder="192.168.1.100" required
                    pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$">
                <small class="help-text">Enter the IP address of your camera</small>
            </div>

            <div class="form-group">
                <label for="httpPort">
                    <i class="fas fa-plug"></i>
                    HTTP Port
                </label>
                <input type="number" id="httpPort" name="httpPort" placeholder="80" value="80" min="1" max="65535"
                    required>
                <small class="help-text">HTTP port for ONVIF communication (usually 80 or 8080)</small>
            </div>

            <div class="form-group">
                <label for="rtspUrl">
                    <i class="fas fa-link"></i>
                    RTSP Stream URL
                </label>
                <input type="text" id="rtspUrl" name="rtspUrl" placeholder="rtsp://192.168.1.100:554/stream1" required>
                <small class="help-text">Full RTSP URL path (e.g., rtsp://ip:554/stream1)</small>
            </div>

            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
                <small class="help-text">Camera login username</small>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <div class="password-input-group">
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                <small class="help-text">Camera login password</small>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                    Back
                </button>
                <button type="button" class="btn-test" onclick="testConnection()">
                    <i class="fas fa-vial"></i>
                    Test Connection
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-video"></i>
                    Connect to Camera
                </button>
            </div>
        </form>

        <div class="status-message" id="statusMessage"></div>

        <div class="config-footer">
            <div class="saved-configs" id="savedConfigs">
                <h3>
                    <i class="fas fa-history"></i>
                    Recent Configurations
                </h3>
                <div id="configList"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
</body>

</html>
